# ---------------------------------------------------------------------------
# NGINX site configuration for the email-gate application
#
# Place at:  /etc/nginx/sites-available/email-gate
# Enable:    sudo ln -s /etc/nginx/sites-available/email-gate \
#                       /etc/nginx/sites-enabled/email-gate
# Test:      sudo nginx -t
# Reload:    sudo systemctl reload nginx
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;

    # Replace with your actual domain (or server IP for testing)
    server_name your-domain.com www.your-domain.com;

    # -----------------------------------------------------------------------
    # Email gate SPA (static files built by Vite)
    # -----------------------------------------------------------------------
    root /opt/email-gate/email-gate/public;
    index index.html;

    # -----------------------------------------------------------------------
    # Proxy paths handled by the Node.js API server
    # -----------------------------------------------------------------------

    # REST API
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Protected static website (served with path-fix injection)
    location /site/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Protected site's absolute-path assets (CSS, JS referenced by /site/)
    location /assets/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache static assets aggressively (they have content-hashed filenames)
        proxy_cache_valid  200 1y;
        add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    # PDF / document downloads from the protected site
    location /documents/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Email gate SPA — serve static files, fall back to index.html
    # -----------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        # Prevent caching of index.html so users always get the latest gate
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
}

# ---------------------------------------------------------------------------
# After setting up SSL with Certbot, this block is added automatically.
# Run:  sudo certbot --nginx -d your-domain.com -d www.your-domain.com
# ---------------------------------------------------------------------------
